{% extends "admin/base_site.html" %}

{% block content %}
<div style="padding: 20px;">
    <h1>Informe de Stock Crítico</h1>
    
    <form method="get" class="no-print" style="margin-bottom: 20px;">
        <label>Piezas con stock menor o igual a:</label>
        <input type="number" name="minimo" value="{{ minimo }}">
        <button type="submit" class="button">Filtrar</button>
    </form>

    <button type="button" class="button no-print" onclick="window.print()" style="margin-bottom: 20px; background: #417690;">
        Imprimir este informe
    </button>

    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="background: #f2f2f2;">
                <th style="padding: 10px; border: 1px solid #ddd;">PIEZA</th>
                <th style="padding: 10px; border: 1px solid #ddd;">REFERENCIA</th>
                <th style="padding: 10px; border: 1px solid #ddd;">STOCK ACTUAL</th>
            </tr>
        </thead>
        <tbody>
            {% for p in piezas %}
            <tr style="text-align: center;">
                <td style="padding: 10px; border: 1px solid #ddd;">{{ p.nombre }}</td>
                <td style="padding: 10px; border: 1px solid #ddd;">{{ p.referencia }}</td>
                <td style="padding: 10px; border: 1px solid #ddd; font-weight: bold;">{{ p.stock }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<style type="text/css" media="print">
    .no-print { display: none !important; }
    h1 { color: black; }
    table { border: 1px solid #000 !important; }
    th, td { border: 1px solid #000 !important; }
</style>
{% endblock %}
